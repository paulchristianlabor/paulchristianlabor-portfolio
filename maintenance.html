<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | Paul Christian Labor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #0a192f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .maintenance-container {
            text-align: center;
            background: #DEDEF0;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        
        .maintenance-container h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .maintenance-container p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .maintenance-container .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .contact-link {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        
        .contact-link:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="icon">⏳</div>
        <h1>Coming Soon !!!!</h1>
        <p>I'm currently updating my portfolio. I'll be back online very soon!</p>
        <p>Thank you for your patience.</p>
    </div>
</body>
</html>
