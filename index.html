<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Modern React portfolio website template for a web developer, built with Vite, TypeScript, and Tailwind CSS."
    />
    <meta name="theme-color" content="#07111f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
    <title>Paul Christian Labor - Web Developer</title>
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #040e14;
        transition: opacity 0.5s ease;
      }
      #preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .preloader-type {
        position: relative;
        display: inline-block;
      }
      .preloader-ghost {
        visibility: hidden;
        display: block;
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        white-space: nowrap;
      }
      .preloader-text {
        position: absolute;
        inset: 0;
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        color: #f5f7fb;
        white-space: nowrap;
        border-right: 2px solid #67e8f9;
        animation: blink 0.7s step-end infinite;
      }
      @keyframes blink {
        50% { border-color: transparent; }
      }
      #root {
        opacity: 0;
        transition: opacity 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-type">
        <span class="preloader-ghost" aria-hidden="true">Paul Christian Labor</span>
        <span class="preloader-text"></span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var chars = 'Paul Christian Labor'.split('')
        var el = document.querySelector('.preloader-text')
        if (!el) return
        var i = 0
        var interval = setInterval(function () {
          el.textContent += chars[i]
          i++
          if (i >= chars.length) clearInterval(interval)
        }, 80)
      })()
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
